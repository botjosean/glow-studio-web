<body>
<main class="page">

  <header class="brand">

    <div class="divider" aria-hidden="true"></div>
    <p class="tagline">Uñas · Pestañas · Cejas</p>

  <section class="status">
    <p class="status-text">Sitio en construcción</p>
    <p class="status-sub">Estamos preparando algo especial. Mientras tanto, compartí un video de tu trabajo con nosotras.</p>

  <section class="upload" id="upload">
    <button class="btn-upload" id="uploadToggle" type="button" aria-expanded="false" aria-controls="uploadForm">
      Compartir video
    </button>
    <form class="upload-form" id="uploadForm" hidden>
      <label class="file-label" for="fileInput">
        <span id="fileLabelText">Elegí un archivo de video</span>
        <input type="file" id="fileInput" name="file" accept="video/*" required>
      </label>
      <button type="submit" class="btn-submit">Enviar</button>
      <p class="upload-status" id="uploadStatus" role="status" aria-live="polite"></p>
    </form>
  </section>

  <footer class="contact">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.4" cy="6.6" r="0.9" fill="currentColor" stroke="none"/>
        </svg>
        <span>Instagram</span>

      <!-- TODO(contenido): confirmar/actualizar el usuario real de TikTok -->

          <path d="M14 3v10.5a3.5 3.5 0 1 1-3.5-3.5" stroke-linecap="round"/>
          <path d="M14 3c0 2.5 2 4.5 4.5 4.5" stroke-linecap="round"/>
